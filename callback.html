<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>認証中… | Sorcery City</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+JP&display=swap" rel="stylesheet">
  <style>
    :root { --purple:#7c5cfc; --gold:#f0c060; --bg:#04030d; }
    * { margin:0;padding:0;box-sizing:border-box; }
    body {
      background:var(--bg);color:#e8e0ff;font-family:'Noto Sans JP',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    .card {
      background:rgba(8,6,24,0.98);border:1px solid rgba(124,92,252,0.4);
      border-radius:20px;padding:48px 40px;text-align:center;max-width:380px;width:90%;
      box-shadow:0 0 60px rgba(124,92,252,0.2);
    }
    .icon { font-size:2.5rem;margin-bottom:20px;display:block; }
    h1 { font-family:'Cinzel',serif;font-size:1.1rem;color:#fff;margin-bottom:10px; }
    p { font-size:0.82rem;color:rgba(155,146,200,0.6);line-height:1.8; }
    .spinner {
      width:36px;height:36px;border:3px solid rgba(124,92,252,0.2);
      border-top-color:var(--purple);border-radius:50%;
      animation:spin .8s linear infinite;margin:20px auto;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .err { color:#ff8899;font-size:0.85rem;margin-top:16px; }
    .back-btn {
      display:inline-block;margin-top:20px;padding:10px 24px;
      background:rgba(124,92,252,0.15);border:1px solid rgba(124,92,252,0.3);
      border-radius:10px;color:var(--purple);font-size:0.85rem;text-decoration:none;
      transition:background .2s;
    }
    .back-btn:hover { background:rgba(124,92,252,0.25); }
  </style>
</head>
<body>
<div class="card">
  <span class="icon">✦</span>
  <h1 id="title">Discord認証中…</h1>
  <div class="spinner" id="spinner"></div>
  <p id="msg">少々お待ちください</p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<script>
// ★ ここを自分のFirebase設定に変更 ★
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};
// ★ Firebase FunctionsのベースURL（デプロイ後に変更） ★
const FUNCTIONS_BASE = "https://us-central1-YOUR_PROJECT_ID.cloudfunctions.net";

firebase.initializeApp(FIREBASE_CONFIG);

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const error = params.get("error");

  const title = document.getElementById("title");
  const msg = document.getElementById("msg");
  const spinner = document.getElementById("spinner");
  const card = document.querySelector(".card");

  if (error || !code) {
    spinner.style.display = "none";
    title.textContent = "認証がキャンセルされました";
    msg.textContent = "Discordの認証を拒否したか、エラーが発生しました。";
    card.insertAdjacentHTML("beforeend",
      '<a class="back-btn" href="index.html">← ルールページへ戻る</a>');
    return;
  }

  try {
    // Firebase FunctionにPOST
    const res = await fetch(`${FUNCTIONS_BASE}/discordCallback`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();

    if (!data.success || !data.customToken) throw new Error(data.error || "Unknown error");

    // Firebase Authにサインイン
    await firebase.auth().signInWithCustomToken(data.customToken);

    // ユーザー情報をsessionStorageに保存
    sessionStorage.setItem("sc_user", JSON.stringify(data.user));

    title.textContent = "認証完了！";
    spinner.style.display = "none";
    msg.innerHTML = `<strong style="color:#fff;">${data.user.displayName}</strong> さん、こんにちは！<br>ルールページへ移動します…`;

    setTimeout(() => { window.location.href = "index.html"; }, 1500);

  } catch (err) {
    console.error(err);
    spinner.style.display = "none";
    title.textContent = "エラーが発生しました";
    msg.innerHTML = `<span class="err">認証に失敗しました。<br>${err.message}</span>`;
    card.insertAdjacentHTML("beforeend",
      '<a class="back-btn" href="index.html">← ルールページへ戻る</a>');
  }
}

handleCallback();
</script>
</body>
</html>
